<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}wikihub{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark-dimmed.min.css">
<style>
:root {
  --bg-base: #0f0e0c;
  --bg-surface: #191714;
  --bg-elevated: #221f1b;
  --bg-overlay: #2a2622;
  --text-primary: #e8e0d4;
  --text-secondary: #b8ad9e;
  --text-tertiary: #887d6e;
  --text-muted: #5a5248;
  --accent: #d4a04a;
  --accent-hover: #e0b35a;
  --accent-muted: rgba(212, 160, 74, 0.12);
  --accent-subtle: rgba(212, 160, 74, 0.06);
  --color-public: #7a9e6b;
  --color-private: #c45c3c;
  --color-unlisted: #b8ad9e;
  --color-wikilink: #d4a04a;
  --color-wikilink-broken: #c45c3c;
  --color-external: #7a9bb5;
  --border-default: rgba(200, 180, 150, 0.08);
  --border-emphasis: rgba(200, 180, 150, 0.15);
  --border-strong: rgba(200, 180, 150, 0.25);
  --border-accent: rgba(212, 160, 74, 0.4);
  --control-bg: rgba(0, 0, 0, 0.2);
  --control-border: rgba(200, 180, 150, 0.12);
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Menlo', monospace;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg-base);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-base);
  border-bottom: 1px solid var(--border-default);
  padding: 0 16px; height: 56px;
  display: flex; align-items: center; gap: 16px;
}
.nav-logo {
  font-family: var(--font-mono); font-weight: 500;
  font-size: 1.0625rem; text-decoration: none; line-height: 1;
}
.nav-logo .bracket { color: var(--text-tertiary); }
.nav-logo .wordmark { color: var(--text-primary); }
.nav-spacer { flex: 1; }
.nav-link { color: var(--text-tertiary); font-size: 0.875rem; text-decoration: none; }
.nav-link:hover { color: var(--text-primary); text-decoration: none; }
.nav-agents { color: var(--accent); font-weight: 500; font-family: var(--font-mono); font-size: 0.8125rem; }
.nav-agents:hover { color: var(--accent-hover); }
.nav-account {
  position: relative;
  display: flex;
  align-items: center;
}
.nav-account-trigger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 36px;
  padding: 2px 6px 2px 2px;
  border: 1px solid transparent;
  border-radius: 999px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-body);
}
.nav-account-trigger:hover,
.nav-account:focus-within .nav-account-trigger,
.nav-account.open .nav-account-trigger {
  color: var(--text-primary);
  background: var(--accent-subtle);
  border-color: var(--border-default);
}
.nav-avatar-link { text-decoration: none; display: flex; }
.nav-avatar-link:hover { text-decoration: none; }
.nav-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent-muted); border: 1px solid var(--border-accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent);
  text-decoration: none;
}
.nav-avatar-link:hover .nav-avatar { border-color: var(--accent); }
.nav-account-chevron {
  color: var(--text-muted);
  transition: transform 0.14s ease;
}
.nav-account.open .nav-account-chevron {
  transform: rotate(180deg);
}
.nav-account-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  z-index: 200;
  width: 220px;
  padding: 8px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-emphasis);
  background: rgba(25, 23, 20, 0.98);
  backdrop-filter: blur(12px);
  box-shadow: none;
  opacity: 0;
  transform: translateY(-4px);
  pointer-events: none;
  transition: opacity 0.14s ease, transform 0.14s ease;
}
.nav-account.open .nav-account-menu {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.nav-account-menu::before {
  content: '';
  position: absolute;
  top: -12px;
  left: 0;
  right: 0;
  height: 12px;
}
.nav-account-summary {
  padding: 10px 12px 12px;
  border-bottom: 1px solid var(--border-default);
  margin-bottom: 4px;
}
.nav-account-summary strong {
  display: block;
  font-size: 0.875rem;
  color: var(--text-primary);
}
.nav-account-summary span {
  display: block;
  margin-top: 2px;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.nav-account-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.8125rem;
  text-decoration: none;
}
.nav-account-item:hover {
  background: var(--accent-subtle);
  color: var(--text-primary);
  text-decoration: none;
}
.nav-account-item.logout {
  color: #d88c75;
}
.nav-account-item .menu-hint {
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  color: var(--text-muted);
}
@media (min-width: 640px) { .nav { padding: 0 24px; } }

.search-trigger {
  display: none; align-items: center; gap: 6px; padding: 6px 12px;
  -webkit-appearance: none; appearance: none;
  background: #1a1816 !important; border: 1px solid var(--control-border);
  border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer;
  font-size: 0.75rem; font-family: var(--font-body); min-height: 32px;
}
@media (min-width: 640px) { .search-trigger { display: flex; } }
.search-trigger:hover { border-color: var(--border-emphasis); color: var(--text-secondary); }
.search-trigger kbd { font-family: var(--font-mono); font-size: 0.625rem; background: var(--bg-elevated); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--border-default); }

.search-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
.search-overlay.open { display: block; }
.search-modal {
  display: none; position: fixed; top: 15vh; left: 50%; transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 600px;
  background: var(--bg-elevated); border: 1px solid var(--border-emphasis);
  border-radius: var(--radius-lg); z-index: 201; overflow: hidden;
}
.search-modal.open { display: block; }
@media (max-width: 767px) {
  .search-modal.open { top: 0; left: 0; right: 0; bottom: 0; transform: none; width: 100%; max-width: none; border-radius: 0; max-height: 100vh; }
}
.search-input {
  width: 100%; padding: 16px 20px; border: none; outline: none;
  background: transparent; color: var(--text-primary);
  font-size: 1.125rem; font-family: var(--font-body);
  border-bottom: 1px solid var(--border-default);
}
.search-input::placeholder { color: var(--text-muted); }
#search-results { max-height: 400px; overflow-y: auto; }
.search-result {
  display: block; padding: 12px 20px; text-decoration: none;
  border-bottom: 1px solid var(--border-default);
  transition: background 0.1s ease;
}
.search-result:hover, .search-result.active { background: var(--accent-subtle); text-decoration: none; }
.search-result-path { font-size: 0.6875rem; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: 2px; }
.search-result-title { font-size: 0.875rem; color: var(--text-primary); font-weight: 500; margin-bottom: 2px; }
.search-result-excerpt { font-size: 0.75rem; color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.875rem; }
.search-create { display: block; padding: 12px 20px; color: var(--accent); font-size: 0.875rem; text-decoration: none; font-weight: 500; }
.search-create:hover { background: var(--accent-subtle); text-decoration: none; }

@keyframes wh-spin { to { transform: rotate(360deg); } }
.wh-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-emphasis); border-top-color: var(--accent); border-radius: 50%; animation: wh-spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
.btn-primary .wh-spinner, .btn-save .wh-spinner { border-color: rgba(15, 14, 12, 0.25); border-top-color: #0f0e0c; }
.btn-loading { pointer-events: none; opacity: 0.7; }

.hover-preview {
  position: fixed; z-index: 300; pointer-events: auto;
  width: 320px; max-height: 400px; overflow-y: auto; overflow-x: hidden;
  background: var(--bg-elevated); border: 1px solid var(--border-emphasis);
  border-radius: var(--radius-md); padding: 16px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  font-size: 0.8125rem; line-height: 1.6; color: var(--text-secondary);
}
.hover-preview-title {
  font-size: 0.9375rem; font-weight: 600; color: var(--text-primary);
  margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.hover-preview-excerpt { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
.hover-preview-more { display: block; margin-top: 8px; font-size: 0.75rem; color: var(--accent); text-decoration: none; }
.hover-preview-loading { color: var(--text-muted); font-style: italic; }
.hover-preview-related { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border-default); }
.hover-preview-related-label { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px; }
.hover-preview-link { display: block; font-size: 0.75rem; color: var(--accent); text-decoration: none; padding: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hover-preview-link:hover { text-decoration: underline; }

{% block extra_css %}{% endblock %}
</style>

<body>
{% include '_nav.html' %}

<div class="search-overlay" id="search-overlay"></div>
<div class="search-modal" id="search-modal"{% if current_user and current_user.is_authenticated %} data-username="{{ current_user.username }}"{% endif %}>
  <input type="text" class="search-input" id="search-input" placeholder="Search wikis..." autocomplete="off">
  <div id="search-results"></div>
</div>

{% block body %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<script>
(function(){var m=document.querySelector('meta[name="csrf-token"]');if(!m)return;var F=window.fetch;window.fetch=function(u,o){o=o||{};var mt=(o.method||'GET').toUpperCase();if(mt!=='GET'&&mt!=='HEAD'){var s=typeof u==='string'?u:u.url||'';if(!s.startsWith('/api/')){o.headers=o.headers||{};if(o.headers instanceof Headers){if(!o.headers.has('X-CSRFToken'))o.headers.set('X-CSRFToken',m.content)}else{if(!o.headers['X-CSRFToken'])o.headers['X-CSRFToken']=m.content}}}return F.call(this,u,o)}})();
document.addEventListener('DOMContentLoaded', () => {
  var katexMacros = {"\\Sum": "\\sum"};
  try {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
      ],
      macros: katexMacros,
      throwOnError: false,
    });
  } catch(e) {}
  try {
    document.querySelectorAll('.math.amsmath').forEach(function(el) {
      katex.render(el.textContent.trim(), el, {displayMode: true, throwOnError: false, macros: katexMacros});
    });
  } catch(e) {}
  try {
    document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  } catch(e) {}

  const accountMenus = document.querySelectorAll('[data-account-menu]');
  accountMenus.forEach((menu) => {
    const trigger = menu.querySelector('[data-account-trigger]');
    if (!trigger) return;

    const closeMenu = () => {
      menu.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    };

    const openMenu = () => {
      menu.classList.add('open');
      trigger.setAttribute('aria-expanded', 'true');
    };

    trigger.addEventListener('click', (event) => {
      event.preventDefault();
      if (menu.classList.contains('open')) closeMenu();
      else openMenu();
    });

    document.addEventListener('click', (event) => {
      if (!menu.contains(event.target)) closeMenu();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeMenu();
    });
  });
});
</script>
{% include '_footer.html' %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
<script>
// hover preview cards for wikilinks and internal links
(function() {
  var card = null;
  var hideTimer = null;
  var cache = {};
  var currentTarget = null;

  function createCard() {
    if (card) return card;
    card = document.createElement('div');
    card.className = 'hover-preview';
    card.style.display = 'none';
    card.addEventListener('mouseenter', function() { clearTimeout(hideTimer); });
    card.addEventListener('mouseleave', function() { hide(); });
    document.body.appendChild(card);
    return card;
  }

  function extractWikilinks(content) {
    if (!content) return [];
    var re = /\[\[([^\]|]+)(?:\|[^\]]*)?\]\]/g;
    var links = [], seen = {}, m;
    while ((m = re.exec(content)) !== null) {
      var name = m[1].trim();
      if (!seen[name]) { seen[name] = true; links.push(name); }
      if (links.length >= 5) break;
    }
    return links;
  }

  function appendRelatedLinks(container, links, owner, slug) {
    var relatedEl = document.createElement('div');
    relatedEl.className = 'hover-preview-related';
    var labelEl = document.createElement('div');
    labelEl.className = 'hover-preview-related-label';
    labelEl.textContent = 'Related to';
    relatedEl.appendChild(labelEl);
    links.forEach(function(name) {
      var linkEl = document.createElement('a');
      linkEl.className = 'hover-preview-link';
      linkEl.textContent = name;
      var linkSlug = name.replace(/\s+/g, '_');
      linkEl.href = '/@' + owner + '/' + slug + '/wiki/' + encodeURIComponent(linkSlug);
      // direct listeners for chaining (don't rely on delegation)
      linkEl.addEventListener('mouseenter', function() {
        clearTimeout(hideTimer);
        var parsed = parseWikiUrl(linkEl.href);
        if (parsed) {
          currentTarget = linkEl;
          fetchPreview(parsed, linkEl);
        }
      });
      linkEl.addEventListener('mouseleave', function(e) {
        if (e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.hover-preview')) return;
        hide();
      });
      relatedEl.appendChild(linkEl);
    });
    container.appendChild(relatedEl);
  }

  function fillCard(c, data) {
    clearTimeout(hideTimer);
    c.textContent = '';
    var pageUrl = '/@' + (data._owner || '') + '/' + (data._slug || '') + '/' + (data.path || '');
    var titleEl = document.createElement('div');
    titleEl.className = 'hover-preview-title';
    titleEl.textContent = data.title || data.path;
    c.appendChild(titleEl);
    if (data.excerpt) {
      var excerptEl = document.createElement('div');
      excerptEl.className = 'hover-preview-excerpt';
      excerptEl.textContent = data.excerpt;
      c.appendChild(excerptEl);
    }
    var moreEl = document.createElement('a');
    moreEl.className = 'hover-preview-more';
    moreEl.textContent = '(read more)';
    moreEl.href = pageUrl;
    c.appendChild(moreEl);
    var links = extractWikilinks(data.content);
    if (links.length > 0 && data._owner && data._slug) {
      appendRelatedLinks(c, links, data._owner, data._slug);
    }
  }

  function show(el, data) {
    var c = createCard();
    fillCard(c, data);
    position(c, el);
    c.style.display = 'block';
  }

  function showLoading(el) {
    clearTimeout(hideTimer);
    var c = createCard();
    c.textContent = '';
    var loading = document.createElement('div');
    loading.className = 'hover-preview-loading';
    loading.textContent = 'Loading\u2026';
    c.appendChild(loading);
    position(c, el);
    c.style.display = 'block';
  }

  function positionFromRect(c, rect) {
    var top = rect.bottom + 8;
    var left = rect.left;
    if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
    if (left < 10) left = 10;
    if (top + 280 > window.innerHeight) top = rect.top - 288;
    c.style.top = top + 'px';
    c.style.left = left + 'px';
  }

  function position(c, el) {
    positionFromRect(c, el.getBoundingClientRect());
  }


  function hide() {
    hideTimer = setTimeout(function() {
      if (card) card.style.display = 'none';
      currentTarget = null;
    }, 200);
  }

  function parseWikiUrl(href) {
    try {
      var url = new URL(href, window.location.origin);
      var m = url.pathname.match(/^\/@([^/]+)\/([^/]+)\/(.+)/);
      if (!m) return null;
      return { owner: m[1], slug: m[2], path: m[3] };
    } catch (e) { return null; }
  }

  function fetchPreview(parsed, el) {
    var key = parsed.owner + '/' + parsed.slug + '/' + parsed.path;
    var insideCard = card && card.contains(el);
    if (cache[key]) {
      if (insideCard) { fillCard(card, cache[key]); }
      else { show(el, cache[key]); }
      return;
    }

    if (!insideCard) showLoading(el);

    var apiPath = '/api/v1/wikis/' + parsed.owner + '/' + parsed.slug + '/pages/' + parsed.path;
    if (!apiPath.endsWith('.md')) apiPath += '.md';

    fetch(apiPath)
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) { if (!insideCard && card) card.style.display = 'none'; return; }
        data._owner = parsed.owner;
        data._slug = parsed.slug;
        cache[key] = data;
        if (insideCard) {
          // chain: update content in place, don't reposition
          fillCard(card, data);
        } else {
          show(el, data);
        }
      })
      .catch(function() { if (!insideCard && card) card.style.display = 'none'; });
  }

  // mouseover/mouseout bubble (unlike mouseenter/mouseleave) so they
  // reliably fire on links inside the hover card for chaining
  var lastHoverEl = null;
  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('.wikilink, .article a[href^="/@"]');
    if (!el || el === lastHoverEl) return;
    lastHoverEl = el;
    var href = el.getAttribute('href');
    if (!href || href.startsWith('#')) return;
    var parsed = parseWikiUrl(href);
    if (!parsed) return;

    clearTimeout(hideTimer);
    currentTarget = el;
    fetchPreview(parsed, el);
  });

  document.addEventListener('mouseout', function(e) {
    var el = e.target.closest('.wikilink, .article a[href^="/@"]');
    if (!el) return;
    // don't hide if moving to the card or another wikilink
    var related = e.relatedTarget;
    if (related && (related.closest('.hover-preview') || related.closest('.wikilink'))) return;
    lastHoverEl = null;
    hide();
  });
})();
</script>
{% block scripts %}{% endblock %}
