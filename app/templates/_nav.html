<nav class="nav">
  <a href="/" class="nav-logo"><span class="bracket">[[</span><span class="wordmark">wikihub</span><span class="bracket">]]</span></a>
  <button class="search-trigger" onclick="wikihubSearch && wikihubSearch.open()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Search <kbd>&#8984;K</kbd>
  </button>
  <div class="nav-spacer"></div>
  <a href="/explore" class="nav-link">Explore</a>
  <a href="/people" class="nav-link nav-hide-mobile">People</a>
  <a href="/agents" class="nav-link nav-agents nav-hide-mobile">For Agents</a>
  <button type="button" class="theme-toggle" data-theme-toggle aria-label="Theme: Auto (follow system)" title="Theme: Auto (follow system)">
    <!-- auto: half sun/half moon -->
    <svg class="theme-ico-auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="8"/>
      <path d="M12 4 A8 8 0 0 1 12 20 Z" fill="currentColor" stroke="none"/>
    </svg>
    <!-- light: sun -->
    <svg class="theme-ico-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <!-- dark: moon -->
    <svg class="theme-ico-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  {% if current_user and current_user.is_authenticated %}
    <a href="/@{{ current_user.username }}" class="nav-link nav-hide-mobile">My Wiki</a>
    <div class="nav-account" data-account-menu>
      <button
        type="button"
        class="nav-account-trigger"
        aria-haspopup="menu"
        aria-expanded="false"
        aria-label="Account menu"
        data-account-trigger
      >
        <span class="nav-avatar">{{ current_user.username[0]|upper }}</span>
        <svg class="nav-account-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="nav-account-menu" role="menu" aria-label="Account">
        <div class="nav-account-summary">
          <strong>{{ current_user.display_name or current_user.username }}</strong>
          <span>@{{ current_user.username }}</span>
        </div>
        <a href="/@{{ current_user.username }}" class="nav-account-item" role="menuitem">
          <span>View profile</span>
          <span class="menu-hint">home</span>
        </a>
        <a href="/shared" class="nav-account-item" role="menuitem">
          <span>Shared</span>
          <span class="menu-hint">access</span>
        </a>
        <a href="/settings" class="nav-account-item" role="menuitem">
          <span>Settings</span>
          <span class="menu-hint">account</span>
        </a>
        <a href="/auth/logout" class="nav-account-item logout" role="menuitem">
          <span>Logout</span>
          <span class="menu-hint">exit</span>
        </a>
      </div>
    </div>
  {% else %}
    <a href="/auth/login?next={{ request.path|urlencode }}" class="nav-link">Sign in</a>
  {% endif %}
</nav>
