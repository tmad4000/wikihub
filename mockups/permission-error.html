<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access denied — wikihub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0f0e0c;
    --bg-surface: #191714;
    --bg-elevated: #221f1b;
    --bg-overlay: #2a2622;
    --text-primary: #e8e0d4;
    --text-secondary: #b8ad9e;
    --text-tertiary: #887d6e;
    --text-muted: #5a5248;
    --accent: #d4a04a;
    --accent-hover: #e0b35a;
    --accent-muted: rgba(212, 160, 74, 0.12);
    --accent-subtle: rgba(212, 160, 74, 0.06);
    --color-public: #7a9e6b;
    --color-private: #c45c3c;
    --color-unlisted: #b8ad9e;
    --color-edit: #d4a04a;
    --color-wikilink: #d4a04a;
    --color-external: #7a9bb5;
    --color-success: #7a9e6b;
    --color-warning: #d4a04a;
    --color-error: #c45c3c;
    --border-default: rgba(200, 180, 150, 0.08);
    --border-emphasis: rgba(200, 180, 150, 0.15);
    --border-strong: rgba(200, 180, 150, 0.25);
    --border-accent: rgba(212, 160, 74, 0.4);
    --control-bg: rgba(0, 0, 0, 0.2);
    --control-bg-hover: rgba(200, 180, 150, 0.08);
    --control-border: rgba(200, 180, 150, 0.12);
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Menlo', monospace;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 10px;
    --touch-min: 44px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-primary);
    background: var(--bg-base);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* top nav */
  .topnav {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-default);
    background: var(--bg-surface);
    min-height: var(--touch-min);
    flex-shrink: 0;
  }
  .topnav-logo {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 16px;
    text-decoration: none;
    white-space: nowrap;
  }
  .topnav-logo .bracket { color: var(--text-tertiary); }
  .topnav-logo .name { color: var(--text-primary); }
  .topnav-right {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .topnav-right a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: var(--radius-md);
    min-height: var(--touch-min);
    display: flex;
    align-items: center;
  }
  .topnav-right a:hover { color: var(--text-primary); background: var(--control-bg-hover); }

  /* center content */
  .error-page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .error-card {
    text-align: center;
    max-width: 460px;
    width: 100%;
  }

  .error-icon {
    margin-bottom: 24px;
    display: block;
  }
  .error-icon svg {
    width: 72px;
    height: 72px;
  }

  .error-heading {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .error-sub {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .error-wiki-ref {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 10px 16px;
    margin-bottom: 32px;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-tertiary);
  }
  .error-wiki-ref .lock-icon svg {
    width: 16px;
    height: 16px;
    display: block;
  }

  .error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 24px;
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    min-height: var(--touch-min);
    min-width: 140px;
  }
  .btn-primary {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: var(--bg-base);
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-secondary {
    background: var(--bg-elevated);
    border: 1px solid var(--border-emphasis);
    color: var(--text-primary);
  }
  .btn-secondary:hover { border-color: var(--border-strong); background: var(--bg-overlay); }

  @media (max-width: 767px) {
    .error-heading { font-size: 22px; }
    .error-icon svg { width: 56px; height: 56px; }
    .error-actions { flex-direction: column; align-items: center; }
    .btn { width: 100%; max-width: 280px; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="topnav-logo"><span class="bracket">[[</span><span class="name">wikihub</span><span class="bracket">]]</span></a>
  <div class="topnav-right">
    <a href="/explore">Explore</a>
    <a href="/login">Sign in</a>
  </div>
</nav>

<main class="error-page">
  <div class="error-card">
    <span class="error-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="32" width="40" height="28" rx="4" stroke="var(--color-private)" stroke-width="2.5"/>
        <path d="M24 32V24a12 12 0 0124 0v8" stroke="var(--color-private)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="36" cy="44" r="3" fill="var(--color-private)"/>
        <line x1="36" y1="47" x2="36" y2="52" stroke="var(--color-private)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </span>

    <h1 class="error-heading">You don't have access to this page</h1>

    <p class="error-sub">
      This page is private. Contact the wiki owner for access.
    </p>

    <div class="error-wiki-ref">
      <span class="lock-icon"><svg viewBox="0 0 16 16" fill="none" stroke="var(--color-private)" stroke-width="1.5"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/></svg></span>
      @alice / research-wiki
    </div>

    <div class="error-actions">
      <a href="/login" class="btn btn-primary">Sign in</a>
      <a href="/explore" class="btn btn-secondary">Go to Explore</a>
    </div>
  </div>
</main>

</body>
</html>
