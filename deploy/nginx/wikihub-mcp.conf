# mcp.wikihub.md — WikiHub MCP server (standalone node, port 4200)
# Must be more specific than the *.wikihub.md wildcard in /etc/nginx/sites-enabled/wikihub.

server {
    listen 443 ssl;
    server_name mcp.wikihub.md;

    ssl_certificate /etc/nginx/ssl/wikihub.md.crt;
    ssl_certificate_key /etc/nginx/ssl/wikihub.md.key;

    client_max_body_size 5M;

    location / {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # SSE / Streamable HTTP — don't buffer
        proxy_buffering off;
        proxy_cache off;
    }
}

server {
    listen 80;
    server_name mcp.wikihub.md;
    client_max_body_size 5M;

    location / {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }
}
