# AI / SEO bot throttling for wikihub. Two layers:
#   1. is_ai_bot → used in /etc/nginx/sites-enabled/wikihub to 429 expensive
#      /history and /commit/<sha> endpoints entirely.
#   2. global bot rate limit (10r/m per UA) — keeps overall bot load polite
#      so they cannot saturate the 1-vCPU box even on cheap routes.
# Bots can still index regular page reads, just at a sustainable rate.

map $http_user_agent $is_ai_bot {
    default              "";
    "~*GPTBot"           "1";
    "~*ClaudeBot"        "1";
    "~*PerplexityBot"    "1";
    "~*Applebot"         "1";
    "~*Bytespider"       "1";
    "~*GoogleOther"      "1";
    "~*MJ12bot"          "1";
    "~*SemrushBot"       "1";
    "~*AhrefsBot"        "1";
    "~*DotBot"           "1";
    "~*facebookexternalhit" "1";
}

# Map bot UA to a stable key for limit_req. Non-bots get empty string,
# which means limit_req will not throttle them.
map $http_user_agent $bot_key {
    default              "";
    "~*GPTBot"           "gptbot";
    "~*ClaudeBot"        "claudebot";
    "~*PerplexityBot"    "perplexity";
    "~*Applebot"         "applebot";
    "~*Bytespider"       "bytespider";
    "~*GoogleOther"      "googleother";
    "~*MJ12bot"          "mj12bot";
    "~*SemrushBot"       "semrushbot";
    "~*AhrefsBot"        "ahrefsbot";
    "~*DotBot"           "dotbot";
    "~*facebookexternalhit" "fbexternal";
}

# 10 requests per minute per bot identity, allow burst of 5.
# Empty key (humans) is not throttled.
limit_req_zone $bot_key zone=botsglobal:10m rate=10r/m;
limit_req_status 429;
