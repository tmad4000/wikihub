# Per-IP rate limit zones for expensive AI routes and the general API.
# AI routes call Anthropic and keep a stricter cap. The generic API is wide
# enough for authenticated agents bulk-publishing many wiki pages.
limit_req_zone $binary_remote_addr zone=ai_per_ip:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=600r/m;
