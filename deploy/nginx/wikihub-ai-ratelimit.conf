# Per-IP rate limit zones for /api/v1/agent/chat and /api/v1/roadmap/create-issues.
# These call Anthropic and cost real money. Strict cap at nginx level on top of
# whatever app-level limits exist (wikihub-17v7).
limit_req_zone $binary_remote_addr zone=ai_per_ip:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=60r/m;
