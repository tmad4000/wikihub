# Shared upstream
upstream wikihub_app {
    server 127.0.0.1:5100;
}

# wikihub.globalbr.ai — Cloudflare Flexible SSL (port 80)
server {
    listen 80;
    server_name wikihub.globalbr.ai;
    client_max_body_size 50M;

    location / {
        proxy_pass http://wikihub_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# wikihub.md — HTTPS (Cloudflare Full SSL, self-signed origin cert)
server {
    listen 443 ssl;
    server_name wikihub.md www.wikihub.md *.wikihub.md;

    ssl_certificate /etc/nginx/ssl/wikihub.md.crt;
    ssl_certificate_key /etc/nginx/ssl/wikihub.md.key;

    client_max_body_size 50M;

    # Service worker (wikihub-o1ib): the SW registers with scope '/' from
    # base.html / landing.html. Without Service-Worker-Allowed: /, browsers
    # reject the registration because the SW lives under /static/. Exact-match
    # location wins over both regex and prefix, so this evaluates first.
    location = /static/sw.js {
        add_header Service-Worker-Allowed "/" always;
        proxy_pass http://wikihub_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Throttle AI / SEO bots on expensive git-log endpoints (wikihub-curator ops).
    # Regex location wins over prefix location /, so this evaluates first.
    location ~ "(/history$|/commit/[a-f0-9]+)" {
        if ($is_ai_bot) {
            add_header Retry-After 3600 always;
            return 429;
        }
        proxy_pass http://wikihub_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Welcome / 429 rate-limit fallback page. wikihub-curator ops + wikihub-fg1p.
    #
    # IMPORTANT (wikihub-fg1p): DO NOT add `error_page 404 = @welcome_redirect;`
    # or `proxy_intercept_errors on;` at server scope. Flask returns intentional
    # 404/403 with its own permission_error.html (with proper Sign in CTA);
    # intercepting them rewrites every private-page miss to welcome.html with
    # HTTP 200, leaving logged-out users dead-ended.
    #
    # Only nginx-originated 429s (limit_req) are routed here, and POST/etc.
    # get a JSON 429 instead of the HTML welcome page.
    error_page 429 =429 @welcome_redirect;
    location = /welcome.html {
        internal;
        root /var/www/wikihub-static;
    }
    location @welcome_redirect {
        # POST/PUT/DELETE/etc. (typically API or form submissions hitting a rate limit)
        # get a clean JSON response instead of an HTML page.
        if ($request_method !~ ^(GET|HEAD)$) {
            add_header Content-Type "application/json" always;
            return 429 '{"error":"rate_limited","message":"Too many requests. Slow down or contact us via /api/v1/feedback."}';
        }
        root /var/www/wikihub-static;
        try_files /welcome.html =500;
    }

    # API endpoints: pass JSON responses through unchanged (incl. 4xx).
    # Without this, the welcome-page intercept eats /api/v1/feedback etc.
    # Tight per-IP rate limit on AI endpoints — they cost real money (Anthropic API)
    # and can be abused. Complements app-level limits in wikihub-17v7.
    location ~ ^/api/v1/(agent/chat|roadmap/create-issues|agent/claude-auth/(login|start)) {
        limit_req zone=ai_per_ip burst=6 nodelay;
        proxy_intercept_errors off;
        proxy_pass http://wikihub_app;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Generic API: pass JSON 4xx through unchanged. wider rate limit.
    location /api/ {
        limit_req zone=api_per_ip burst=120 nodelay;
        proxy_intercept_errors off;
        proxy_pass http://wikihub_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        limit_req zone=botsglobal burst=20 nodelay;
        proxy_pass http://wikihub_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

